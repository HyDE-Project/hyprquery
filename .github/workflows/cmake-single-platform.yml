name: CMake on a single platform

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up cache for build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
            build
          key: ${{ runner.os }}-build-${{ env.BUILD_TYPE }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.BUILD_TYPE }}-

      - name: Install toolchain (GCC13 + Clang17 + libc++)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 clang-17 libc++-dev libc++abi-dev pkg-config build-essential ninja-build
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 13 || true
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 13 || true
          echo "Installed gcc-13 and clang-17 (libc++ available)"
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install spdlog
        run: sudo apt-get install -y libspdlog-dev

      - name: Install pixman
        run: sudo apt-get install -y libpixman-1-dev

      - name: Build and install hyprlang
        run: |
          # Build and install hyprutils first (required by hyprlang)
          git clone --depth=1 https://github.com/hyprwm/hyprutils.git
          cd hyprutils
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_C_COMPILER=/usr/bin/clang-17 -DCMAKE_CXX_COMPILER=/usr/bin/clang++-17 \
            -DCMAKE_CXX_FLAGS='-stdlib=libc++' -DCMAKE_EXE_LINKER_FLAGS='-stdlib=libc++'
          cmake --build build --config Release --target all -j$(nproc)
          sudo cmake --install build
          cd ..
          git clone --depth=1 https://github.com/hyprwm/hyprlang.git
          cd hyprlang
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr \
            -DHYPRLANG_BUILD_TESTS=OFF -DHYPRLANG_BUILD_FUZZERS=OFF \
            -DCMAKE_C_COMPILER=/usr/bin/clang-17 -DCMAKE_CXX_COMPILER=/usr/bin/clang++-17 \
            -DCMAKE_CXX_FLAGS='-stdlib=libc++' -DCMAKE_EXE_LINKER_FLAGS='-stdlib=libc++'
          cmake --build build -j$(nproc)
          sudo cmake --install build

      - name: Configure CMake (use system hyprlang)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DUSE_SYSTEM_HYPRLANG=ON \
            -DCMAKE_C_COMPILER=/usr/bin/clang-17 -DCMAKE_CXX_COMPILER=/usr/bin/clang++-17 \
            -DCMAKE_CXX_FLAGS='-stdlib=libc++' -DCMAKE_EXE_LINKER_FLAGS='-stdlib=libc++'

      # No source-patching: using Clang17 + libc++ to support C++23 <print>

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -- -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C ${{ env.BUILD_TYPE }}

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/**/*
